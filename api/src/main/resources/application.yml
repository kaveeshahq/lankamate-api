spring:
  application:
    name: lankamate-api

  profiles:
    active: local

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/lankamate}
    username: ${DB_USERNAME:lankamate}
    password: ${DB_PASSWORD:lankamate}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'update' is fine for early dev. In Phase 2 proper we switch to Flyway
      # migrations and set this to 'validate' so the schema is version-controlled.
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

---
spring:
  config:
    activate:
      on-profile: local
  jpa:
    show-sql: true
logging:
  level:
    lk.lankamate.api: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
logging:
  level:
    lk.lankamate.api: INFO
    org.springframework.security: WARN