spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: lankamate-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/lankamate}
    username: ${DB_USERNAME:lankamate}
    password: ${DB_PASSWORD:lankamate}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-in-prod-must-be-at-least-256-bits-long-000000}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 1209600000
    issuer: lankamate
  ai:
    provider: gemini
    gemini:
      api-key: ${GEMINI_API_KEY:}
      base-url: https://generativelanguage.googleapis.com/v1beta
      model: gemini-2.5-flash
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

---
spring:
  config:
    activate:
      on-profile: local
  jpa:
    show-sql: true
logging:
  level:
    lk.lankamate.api: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false
logging:
  level:
    lk.lankamate.api: INFO
    org.springframework.security: WARN