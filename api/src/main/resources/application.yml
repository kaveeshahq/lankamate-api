spring:
  application:
    name: lankamate-api

  profiles:
    active: local

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/lankamate}
    username: ${DB_USERNAME:lankamate}
    password: ${DB_PASSWORD:lankamate}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

app:
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-change-in-prod-must-be-at-least-256-bits-long-000000}
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 1209600000
    issuer: lankamate

---
spring:
  config:
    activate:
      on-profile: local
  jpa:
    show-sql: true
logging:
  level:
    lk.lankamate.api: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod
logging:
  level:
    lk.lankamate.api: INFO
    org.springframework.security: WARN